# ============================================================================
# config-builder — Release
# ============================================================================
# Builds standalone executables (Linux + Windows + macOS) and creates a
# GitHub Release whenever a tag matching `config-builder-v*` is pushed.
#
# The tag-prefix convention is the heart of the monorepo strategy:
# tags for OTHER tools (e.g. `log-analyzer-v1.0.0`) trigger their own
# release workflow, never this one.
#
# Release flow:
#   1. Bump config-builder/VERSION
#   2. Update config-builder/CHANGELOG.md
#   3. Commit + push to main, wait for CI green
#   4. git tag -a config-builder-v0.X.Y -m "config-builder v0.X.Y"
#   5. git push origin config-builder-v0.X.Y
#   6. ~10 minutes later: Draft Release on GitHub with three binaries
#
# To duplicate this workflow for a new tool:
#   1. Copy this file to .github/workflows/<new-tool>-release.yml
#   2. Replace every occurrence of `config-builder` with `<new-tool>`
# ============================================================================

name: config-builder Release

on:
  push:
    tags:
      - 'config-builder-v*'
  workflow_dispatch:                  # allow manual builds for testing
    inputs:
      version_override:
        description: 'Version override (e.g. v0.1.0-rc1) for manual builds'
        required: false
        type: string

permissions:
  contents: write                     # needed to create the GitHub Release

defaults:
  run:
    working-directory: config-builder
    shell: bash                      # PowerShell on windows-latest chokes on
                                     # backslash-line-continuation in multi-line
                                     # `run:` blocks; force bash everywhere.

jobs:
  # --------------------------------------------------------------------------
  # Build standalone binaries via PyInstaller
  # --------------------------------------------------------------------------
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: vanguard-config-builder-linux-x64
            binary_ext: ''
          - os: windows-latest
            artifact_name: vanguard-config-builder-windows-x64
            binary_ext: '.exe'
          - os: macos-latest
            artifact_name: vanguard-config-builder-macos-arm64
            binary_ext: ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          # requirements.txt resolves to `-e .` so the runtime deps
          # (PyYAML, pydantic) declared in pyproject.toml come along.
          # TODO Phase 2 (M9): add `--add-data` for bundled YAML files.

      - name: Resolve version
        id: version
        shell: bash
        run: |
          # Tag triggers: extract version after the `config-builder-` prefix.
          # Manual triggers: use the override input or fall back to VERSION.
          if [[ "${{ github.ref }}" == refs/tags/config-builder-v* ]]; then
            VERSION="${GITHUB_REF##refs/tags/config-builder-}"
          elif [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Build standalone binary
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name vanguard-config-builder \
            main.py
          # TODO Phase 2: Add --icon assets/icon.ico (Win) / icon.icns (mac)
          # TODO Phase 2: Add --add-data "data/cvars.yaml:data" once the
          #               cvar database is externalized.

      - name: Rename and stage artifact
        shell: bash
        run: |
          mkdir -p staging
          cp dist/vanguard-config-builder${{ matrix.binary_ext }} \
             staging/${{ matrix.artifact_name }}-${{ steps.version.outputs.version }}${{ matrix.binary_ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: config-builder/staging/

  # --------------------------------------------------------------------------
  # Create the GitHub Release with all three binaries attached
  # --------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/config-builder-v')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF##refs/tags/config-builder-}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF##refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the first ## block matching the version from CHANGELOG.md.
          # If not found, fall back to a generic message.
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for the heading match
          VBARE="${VERSION#v}"
          NOTES=$(awk -v ver="$VBARE" '
            /^## \[/ {
              if (capture) exit
              if (index($0, "[" ver "]")) { capture = 1; next }
            }
            capture { print }
          ' config-builder/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Persist as GH output (heredoc to handle multi-line)
          {
            echo 'notes<<EOF_NOTES'
            echo "$NOTES"
            echo 'EOF_NOTES'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: config-builder ${{ steps.version.outputs.version }}
          draft: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          body: |
            **VanguardMod Config Builder ${{ steps.version.outputs.version }}**

            Desktop GUI tool for generating and validating VanguardMod
            `server.cfg` files.

            ## Changes

            ${{ steps.changelog.outputs.notes }}

            ## Downloads

            | Platform | File |
            |---|---|
            | Linux x64 | `vanguard-config-builder-linux-x64-${{ steps.version.outputs.version }}` |
            | Windows x64 | `vanguard-config-builder-windows-x64-${{ steps.version.outputs.version }}.exe` |
            | macOS ARM64 | `vanguard-config-builder-macos-arm64-${{ steps.version.outputs.version }}` |

            ## Usage

            Download the binary for your platform and run it. No Python
            installation required. See the [config-builder README][1] for
            full documentation.

            [1]: https://github.com/vanguardmod/server-tools/blob/main/config-builder/README.md
          files: artifacts/**/*
