# ============================================================================
# config-builder — Continuous Integration
# ============================================================================
# Runs lint + tests for the config-builder tool.
#
# Path filter: only triggers when config-builder/** or this workflow itself
# changes. Other tools in the monorepo are unaffected.
#
# To duplicate this workflow for a new tool (e.g. log-analyzer):
#   1. Copy this file to .github/workflows/log-analyzer-ci.yml
#   2. Replace every occurrence of `config-builder` with `log-analyzer`
#   3. Adjust paths in `defaults.run.working-directory` if needed
# ============================================================================

name: config-builder CI

on:
  push:
    branches: [main]
    paths:
      - 'config-builder/**'
      - '.github/workflows/config-builder-ci.yml'
  pull_request:
    paths:
      - 'config-builder/**'
      - '.github/workflows/config-builder-ci.yml'
  workflow_dispatch:        # allow manual triggers from the Actions tab

defaults:
  run:
    working-directory: config-builder
    shell: bash                      # PowerShell on windows-latest chokes on
                                     # backslash-line-continuation in multi-line
                                     # `run:` blocks; force bash everywhere.

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      # TODO Phase 2: Add `ruff format --check .` when we adopt the formatter.

  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Run smoke tests
        run: python -m pytest tests/ -v

      # TODO Phase 3: Add coverage reporting via pytest-cov + codecov upload.
